plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.tsp.parking"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "30.0.14904198"

    compileOptions {
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.tsp.parking"
        multiDexEnabled = true
        minSdkVersion flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        buildToolsVersion = "37.0.0-rc2"
    }

    signingConfigs {
        release {
            storeFile = file("keystore.jks")
            storePassword = System.getenv("KEYSTORE_PASSWORD")
            keyAlias = System.getenv("KEY_ALIAS")
            keyPassword = System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            shrinkResources = true
            minifyEnabled = true
        }

        applicationVariants.all { variant ->
            variant.outputs.each { output ->
                // Get the filters (e.g., "arm64-v8a", "armeabi-v7a")
                def abi = output.getFilter(com.android.build.OutputFile.ABI)

                // If abi is null (universal APK), just use "universal" or leave it blank
                def abiSuffix = abi != null ? "-${abi}" : ""

                // Final name: Zupa-release-1.0.0-arm64-v8a.apk
                def name = "Zupa-${variant.name}-${variant.versionName}${abiSuffix}.apk"
                output.outputFileName = name
            }
        }
    }
    buildToolsVersion '37.0.0-rc2'
}

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")
}

kotlin {
    jvmToolchain(17)
}

flutter {
    source = "../.."
}
