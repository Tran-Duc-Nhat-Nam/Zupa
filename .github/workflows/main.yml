name: Flutter CI/CD - Auto Tag & Release

on:
  push:
    branches:
      - main

jobs:
  # --- JOB 1: VERSION CHECK ---
  check_version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.pubspec_version.outputs.VERSION }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from Pubspec
        id: pubspec_version
        run: |
          VERSION=$(sed -n 's/^version: //p' pubspec.yaml | sed 's/+.*//' | xargs)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Tag exists on Remote
        id: check_tag
        run: |
          VERSION=${{ steps.pubspec_version.outputs.VERSION }}
          # ls-remote checks the server directly. If the tag exists, grep will find it.
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "Tag v$VERSION already exists on remote. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION is new."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # --- JOB 2: BUILD AND RELEASE ---
  build_and_release:
    needs: check_version
    if: needs.check_version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Accept Android SDK Licenses
        run: yes | flutter doctor --android-licenses

      - name: Create .env file
        run: |
          echo "END_POINT=${{ secrets.API_URL }}" >> .env
          echo "GITHUB=${{ secrets.GITHUB }}" >> .env
          echo "GITHUB_VERSIONARTE_JSON='${{ secrets.VERSIONARTE_JSON }}'" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Localization (Slang)
        run: dart run slang

      - name: Generate Files (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Tests
        run: flutter test

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build APKs
        run: |
          flutter build apk --obfuscate --split-debug-info=build/debug-info --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.new_version }}
          name: Release v${{ needs.check_version.outputs.new_version }}
          generate_release_notes: true
          files: |
            build/app/outputs/apk/release/Zupa-release-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 3: UPDATE VERSIONARTE ---
  update_version_config:
    needs: [check_version, build_and_release]
    if: needs.check_version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetch all history to generate changelog

      - name: Generate Changelog String
        id: changelog_gen
        run: |
          # Get logs between the last tag and current HEAD
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline -n 10)
          else
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --oneline)
          fi
          # Escape newlines and quotes for JSON compatibility
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | jq -aRs .)
          echo "CHANGELOG=$CHANGELOG_ESCAPED" >> $GITHUB_OUTPUT

      - name: Update versionarte.json
        run: |
          VERSION="${{ needs.check_version.outputs.new_version }}"
          CHANGELOG_RAW='${{ steps.changelog_gen.outputs.CHANGELOG }}'
          
          jq --arg ver "$VERSION" \
             --arg log "$CHANGELOG_RAW" \
             '.android.version.latest = $ver | 
              .iOS.version.latest = $ver | 
              .android.status.message.en = $log | 
              .iOS.status.message.en = $log' \
              versionarte.json > temp.json && mv temp.json versionarte.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add versionarte.json
          git commit -m "chore: update versionarte.json and changelog to v${{ needs.check_version.outputs.new_version }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
