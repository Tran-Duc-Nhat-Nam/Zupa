name: Flutter Build & Release

on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  # Job 1: Quality Assurance & Testing
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Create .env file (for Envied)
        run: echo "END_POINT=${{ secrets.API_URL }}" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Localization Files
        run: dart run slang

      - name: Generate Files (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Static Analysis
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test --reporter expanded

  # Job 2: Build and Deploy
  build_and_release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Create .env file (for Envied)
        run: echo "END_POINT=${{ secrets.API_URL }}" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Localization Files
        run: dart run slang

      - name: Generate Files (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create .env file
        run: echo "END_POINT=${{ secrets.API_URL }}" >> .env

      - name: Build APKs
        run: |
          flutter build apk --release
          flutter build apk --debug
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/apk/release/Zupa-release-*.apk
            build/app/outputs/apk/debug/Zupa-debug-*.apk
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Update Versionarte Config
  update_version_config:
    needs: build_and_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main # Ensure we are updating the main branch

      - name: Update versionarte.json
        run: |
          # Extract version from tag (e.g., v1.1.0 -> 1.1.0)
          VERSION=${GITHUB_REF_NAME#v}
          
          # Use 'jq' to update the JSON file safely
          # We update both minimum and latest to the new version for a "Force Update"
          # Or just 'latest' for an "Optional Update"
          jq ".android.version.latest = \"$VERSION\" | .iOS.version.latest = \"$VERSION\"" versionarte.json > temp.json && mv temp.json versionarte.json
          
          echo "Updated versionarte.json to version $VERSION"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add versionarte.json
          git commit -m "chore: update versionarte.json to ${{ github.ref_name }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
