name: Flutter CI/CD - Auto Tag & Release

on:
  push:
    branches:
      - main

jobs:
  # --- JOB 1: VERSION CHECK ---
  check_version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.pubspec_version.outputs.VERSION }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from Pubspec
        id: pubspec_version
        run: |
          # Robust extraction: only looks at lines starting with 'version:'
          VERSION=$(sed -n 's/^version: //p' pubspec.yaml | sed 's/+.*//' | xargs)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Tag exists
        id: check_tag
        run: |
          VERSION=${{ steps.pubspec_version.outputs.VERSION }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # --- JOB 2: BUILD AND RELEASE ---
  build_and_release:
    needs: check_version
    if: needs.check_version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Create .env file
        run: |
          echo "END_POINT=${{ secrets.API_URL }}" >> .env
          echo "GITHUB_VERSIONARTE_JSON='${{ secrets.VERSIONARTE_JSON }}'" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Localization (Slang)
        run: dart run slang

      - name: Generate Files (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Tests
        run: flutter test

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build APKs
        run: |
          flutter build apk --release
          flutter build apk --debug
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.new_version }}
          name: Release v${{ needs.check_version.outputs.new_version }}
          files: |
            build/app/outputs/apk/release/Zupa-release-*.apk
            build/app/outputs/apk/debug/Zupa-debug-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 3: UPDATE VERSIONARTE ---
  update_version_config:
    needs: [check_version, build_and_release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update versionarte.json
        run: |
          VERSION=${{ needs.check_version.outputs.new_version }}
          jq ".android.version.latest = \"$VERSION\" | .iOS.version.latest = \"$VERSION\"" versionarte.json > temp.json && mv temp.json versionarte.json
          echo "Updated versionarte.json to version $VERSION"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add versionarte.json
          git commit -m "chore: update versionarte.json to v${{ needs.check_version.outputs.new_version }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}