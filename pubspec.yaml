    git:
      url: https://github.com/Tran-Duc-Nhat-Nam-270702/auto_route_library.git
      ref: master
      path: auto_route_generator
  isar_community_generator:
    git:
      url: https://github.com/Tran-Duc-Nhat-Nam-270702/isar-community.git
      ref: v3
      path: packages/isar_community_generator
