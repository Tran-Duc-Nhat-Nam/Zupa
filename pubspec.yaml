    git:
      url: https://github.com/Tran-Duc-Nhat-Nam-270702/reactive_forms_generator.git
      ref: master
      path: packages/reactive_forms_generator

dependency_overrides:
  reactive_forms_annotations: 8.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sites.json

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: RobotoFlex
      fonts:
        - asset: assets/fonts/RobotoFlex-VariableFont.ttf
